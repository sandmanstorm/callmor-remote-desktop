<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Callmor Remote Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #eee; overflow: hidden; }
    .toolbar { background: #1a1a2e; padding: 0.6rem 1rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #333; z-index: 10; position: relative; }
    label { display: flex; align-items: center; gap: 0.25rem; font-size: 0.85rem; }
    input, button { padding: 0.35rem 0.5rem; border-radius: 4px; border: 1px solid #444; background: #222; color: #eee; font-size: 0.85rem; }
    button { cursor: pointer; background: #2563eb; border-color: #2563eb; }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-red { background: #dc2626; border-color: #dc2626; }
    .btn-red:hover { background: #b91c1c; }
    .status { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .status-disconnected { background: #7f1d1d; color: #fca5a5; }
    .status-connecting { background: #78350f; color: #fcd34d; }
    .status-connected { background: #14532d; color: #86efac; }
    .viewer { display: flex; justify-content: center; align-items: center; height: calc(100vh - 44px); background: #000; position: relative; }
    video { max-width: 100%; max-height: 100%; background: #111; cursor: default; }
    .placeholder { color: #555; font-size: 1.2rem; position: absolute; }
    #log { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.92); border-top: 1px solid #333; padding: 0.5rem; max-height: 150px; overflow-y: auto; font-family: monospace; font-size: 0.7rem; display: none; z-index: 20; }
    #log.visible { display: block; }
    .sys { color: #facc15; } .err { color: #f87171; } .ok { color: #4ade80; } .ice { color: #a78bfa; }
  </style>
</head>
<body>
  <div class="toolbar">
    <label>Relay: <input id="url" value="ws://localhost:8080" size="24"></label>
    <label>Machine: <input id="machineId" value="agent-linux-1" size="16"></label>
    <input id="token" type="hidden" value="">
    <button id="connectBtn" onclick="connect()">Connect</button>
    <button id="disconnectBtn" onclick="disconnect()" disabled class="btn-red">Disconnect</button>
    <span id="statusBadge" class="status status-disconnected">Disconnected</span>
    <button onclick="document.getElementById('log').classList.toggle('visible')" style="margin-left:auto;background:#333;border-color:#555;">Log</button>
  </div>

  <script>
    // Session permission (from URL param)
    window.sessionPermission = 'full_control';
    window.sessionId = null;

    // Auto-populate from URL params and auto-connect
    (function() {
      const params = new URLSearchParams(window.location.search);
      if (params.has('relay')) document.getElementById('url').value = params.get('relay');
      if (params.has('machine')) document.getElementById('machineId').value = params.get('machine');
      if (params.has('token')) document.getElementById('token').value = params.get('token');
      if (params.has('permission')) {
        window.sessionPermission = params.get('permission');
      }
      if (params.has('session')) {
        window.sessionId = params.get('session');
      }
      if (params.has('token')) {
        // Auto-connect when session token is provided
        setTimeout(() => document.getElementById('connectBtn').click(), 100);
      }
    })();
  </script>

  <div class="viewer">
    <video id="remoteVideo" autoplay playsinline tabindex="0"></video>
    <div id="placeholder" class="placeholder">Click "Connect" to view remote desktop</div>
  </div>

  <div id="log"></div>

  <script>
    let ws = null;
    let pc = null;
    let inputChannel = null;
    let remoteScreenWidth = 1920;
    let remoteScreenHeight = 1080;

    // Default — overridden by fetchIceServers() before connect()
    let ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }];

    // Pull TURN creds from the API. Without TURN, symmetric-NAT networks
    // (home/corporate/mobile) will ICE-connect briefly then drop.
    async function fetchIceServers() {
      try {
        // Resolve the API host from the relay URL the session used.
        // relay = wss://relay.callmor.ai -> api = https://api.callmor.ai
        const relayParam = new URLSearchParams(window.location.search).get('relay') || '';
        const m = relayParam.match(/^wss?:\/\/([^\/]+)/);
        const host = m ? m[1].replace(/^relay\./, 'api.') : 'api.callmor.ai';
        const proto = (relayParam.startsWith('ws://') || location.protocol === 'http:') ? 'http' : 'https';
        const resp = await fetch(`${proto}://${host}/turn`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        if (Array.isArray(data.ice_servers) && data.ice_servers.length > 0) {
          ICE_SERVERS = data.ice_servers.map(s => ({
            urls: s.urls,
            ...(s.username ? { username: s.username, credential: s.credential } : {}),
          }));
          log(`Loaded ${ICE_SERVERS.length} ICE servers (including TURN)`, 'ok');
        }
      } catch (e) {
        log(`TURN fetch failed (${e.message}); using public STUN only`, 'err');
      }
    }

    function log(text, cls = 'sys') {
      const el = document.getElementById('log');
      const ts = new Date().toLocaleTimeString();
      el.innerHTML += `<span class="${cls}">[${ts}] ${text}</span>\n`;
      el.scrollTop = el.scrollHeight;
    }

    function setStatus(text, state) {
      const badge = document.getElementById('statusBadge');
      badge.textContent = text;
      badge.className = `status status-${state}`;
    }

    function sendSignal(payload) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'relay', payload }));
    }

    function sendInput(event) {
      if (inputChannel && inputChannel.readyState === 'open') {
        inputChannel.send(JSON.stringify(event));
      }
    }

    // --- Coordinate mapping: video element → remote screen ---
    function videoToRemote(clientX, clientY) {
      const video = document.getElementById('remoteVideo');
      const rect = video.getBoundingClientRect();

      // Position within the video element (0..1)
      const relX = (clientX - rect.left) / rect.width;
      const relY = (clientY - rect.top) / rect.height;

      // Map to remote screen coordinates
      return {
        x: Math.round(relX * remoteScreenWidth),
        y: Math.round(relY * remoteScreenHeight)
      };
    }

    // --- Input event handlers ---
    // Use an AbortController so we can cleanly remove listeners on reconnect.
    let inputAbort = null;

    function setupInputCapture() {
      // Remove any stale listeners from a previous session
      if (inputAbort) inputAbort.abort();
      inputAbort = new AbortController();
      const signal = inputAbort.signal;

      const video = document.getElementById('remoteVideo');

      video.addEventListener('mousemove', (e) => {
        const { x, y } = videoToRemote(e.clientX, e.clientY);
        sendInput({ type: 'mousemove', x, y });
      }, { signal });

      video.addEventListener('mousedown', (e) => {
        e.preventDefault();
        video.focus();
        const { x, y } = videoToRemote(e.clientX, e.clientY);
        sendInput({ type: 'mousedown', x, y, button: e.button });
      }, { signal });

      video.addEventListener('mouseup', (e) => {
        e.preventDefault();
        const { x, y } = videoToRemote(e.clientX, e.clientY);
        sendInput({ type: 'mouseup', x, y, button: e.button });
      }, { signal });

      video.addEventListener('wheel', (e) => {
        e.preventDefault();
        const { x, y } = videoToRemote(e.clientX, e.clientY);
        sendInput({ type: 'scroll', x, y, deltaX: e.deltaX, deltaY: e.deltaY });
      }, { passive: false, signal });

      video.addEventListener('contextmenu', (e) => e.preventDefault(), { signal });

      // Keyboard: capture when video is focused
      video.addEventListener('keydown', (e) => {
        e.preventDefault();
        sendInput({ type: 'keydown', code: e.code, key: e.key });
      }, { signal });

      video.addEventListener('keyup', (e) => {
        e.preventDefault();
        sendInput({ type: 'keyup', code: e.code, key: e.key });
      }, { signal });

      log('Input capture attached to video element', 'ok');
    }

    // --- WebRTC ---
    async function connect() {
      const url = document.getElementById('url').value;
      const machineId = document.getElementById('machineId').value;
      const sessionToken = document.getElementById('token').value;

      document.getElementById('connectBtn').disabled = true;
      setStatus('Connecting...', 'connecting');
      log('Fetching TURN credentials...');
      await fetchIceServers();
      log('Connecting to relay...');

      ws = new WebSocket(url);

      ws.onopen = () => {
        const hello = { type: 'hello', role: 'browser', machine_id: machineId };
        if (sessionToken) hello.token = sessionToken;
        ws.send(JSON.stringify(hello));
        log(`Connected to relay as browser for "${machineId}"`, 'ok');
        // Re-send "ready" until we get an offer. The relay drops ready if the
        // agent isn't registered yet, so if the agent is reconnecting or
        // slower to join the room, a single ready can silently disappear.
        // Stopped by handleSignal() when an offer arrives.
        const sendReady = () => {
          sendSignal({ signal: 'ready', session_id: window.sessionId });
        };
        setTimeout(() => {
          sendReady();
          log('Sent "ready" to agent, waiting for offer...', 'ok');
        }, 300);
        window.readyInterval = setInterval(() => {
          if (!pc || pc.signalingState === 'stable' && pc.remoteDescription) return;
          log('Still waiting for agent — resending ready', 'sys');
          sendReady();
        }, 3000);
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'relay' && msg.payload) {
          handleSignal(msg.payload);
        } else if (msg.type === 'error') {
          log(`Relay error: ${msg.message}`, 'err');
        }
      };

      ws.onclose = () => { log('Relay disconnected'); cleanup(); };
      ws.onerror = () => { log('Relay error', 'err'); cleanup(); };
    }

    function cleanup() {
      if (window.readyInterval) { clearInterval(window.readyInterval); window.readyInterval = null; }
      if (window.statsInterval) { clearInterval(window.statsInterval); window.statsInterval = null; }
      window._lastStats = null;
      if (pc) { pc.close(); pc = null; }
      if (ws) {
        try { ws.onopen = ws.onmessage = ws.onclose = ws.onerror = null; } catch {}
        try { ws.close(); } catch {}
        ws = null;
      }
      if (inputAbort) { inputAbort.abort(); inputAbort = null; }
      inputChannel = null;
      // Remove view-only badge if it was added
      const oldBadge = document.getElementById('viewOnlyBadge');
      if (oldBadge) oldBadge.remove();
      document.getElementById('connectBtn').disabled = false;
      document.getElementById('disconnectBtn').disabled = true;
      document.getElementById('remoteVideo').srcObject = null;
      document.getElementById('placeholder').style.display = '';
      setStatus('Disconnected', 'disconnected');
    }

    function disconnect() { if (ws) ws.close(); cleanup(); }

    function createPeerConnection() {
      pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

      // Receive data channel created by the agent
      pc.ondatachannel = (e) => {
        const channel = e.channel;
        log(`Received data channel: "${channel.label}"`, 'ok');
        if (channel.label === 'input') {
          inputChannel = channel;
          inputChannel.onopen = () => {
            log('Input data channel open', 'ok');
            // Send permission to agent
            const perm = window.sessionPermission || 'full_control';
            inputChannel.send(JSON.stringify({ type: 'permission', value: perm }));
            log(`Permission: ${perm}`, 'ok');

            if (perm === 'view_only') {
              // Show view-only indicator (replace if exists to prevent stacking)
              const existing = document.getElementById('viewOnlyBadge');
              if (existing) existing.remove();
              const badge = document.createElement('div');
              badge.id = 'viewOnlyBadge';
              badge.textContent = 'VIEW ONLY';
              badge.style.cssText = 'position:fixed;top:50px;right:10px;background:#fbbf24;color:#78350f;padding:4px 10px;border-radius:4px;font-size:12px;font-weight:bold;z-index:100;';
              document.body.appendChild(badge);
            } else {
              setupInputCapture();
            }
          };
          inputChannel.onmessage = (ev) => {
            try {
              const msg = JSON.parse(ev.data);
              if (msg.type === 'screen-size') {
                remoteScreenWidth = msg.width;
                remoteScreenHeight = msg.height;
                log(`Remote screen: ${msg.width}x${msg.height}`, 'ok');
              }
            } catch {}
          };
          inputChannel.onclose = () => log('Input data channel closed');
        }
      };

      pc.onicecandidate = (e) => {
        if (e.candidate) {
          sendSignal({
            signal: 'ice-candidate',
            candidate: {
              candidate: e.candidate.candidate,
              sdpMLineIndex: e.candidate.sdpMLineIndex,
              sdpMid: e.candidate.sdpMid
            }
          });
        }
      };

      pc.oniceconnectionstatechange = () => {
        log(`ICE: ${pc.iceConnectionState}`);
        if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
          setStatus('Streaming', 'connected');
          document.getElementById('disconnectBtn').disabled = false;
        } else if (pc.iceConnectionState === 'failed') {
          log('ICE connection failed', 'err');
          setStatus('Failed', 'disconnected');
        }
      };

      pc.ontrack = (e) => {
        log(`Received ${e.track.kind} track`, 'ok');
        const video = document.getElementById('remoteVideo');
        video.srcObject = e.streams[0] || new MediaStream([e.track]);
        document.getElementById('placeholder').style.display = 'none';

        // Make decoder state visible so we can tell "frames are decoding"
        // from "stream connected but nothing arrives".
        video.addEventListener('loadedmetadata', () => {
          log(`Video metadata loaded: ${video.videoWidth}x${video.videoHeight}`, 'ok');
        }, { once: true });
        video.addEventListener('playing', () => log('Video element playing', 'ok'), { once: true });
        video.addEventListener('error', () => log(`Video error: ${video.error?.message || 'unknown'}`, 'err'));

        video.play().then(() => {
          log('video.play() resolved', 'ok');
        }).catch((err) => {
          log(`video.play() rejected: ${err.name}: ${err.message}. Click the video to unblock.`, 'err');
          // Add a click-to-play overlay
          document.getElementById('placeholder').textContent = 'Click to start video';
          document.getElementById('placeholder').style.display = '';
          document.getElementById('placeholder').style.cursor = 'pointer';
          document.getElementById('placeholder').onclick = () => {
            video.play().then(() => {
              document.getElementById('placeholder').style.display = 'none';
            });
          };
        });

        // Poll inbound RTP stats so we know if packets/frames are arriving.
        window.statsInterval = setInterval(async () => {
          if (!pc) return;
          try {
            const stats = await pc.getStats(e.track);
            stats.forEach((report) => {
              if (report.type === 'inbound-rtp' && report.kind === 'video') {
                if (!window._lastStats) window._lastStats = { bytes: 0, frames: 0 };
                const dBytes = report.bytesReceived - window._lastStats.bytes;
                const dFrames = (report.framesDecoded || 0) - window._lastStats.frames;
                window._lastStats = { bytes: report.bytesReceived, frames: report.framesDecoded || 0 };
                log(`RX: +${dBytes} bytes, +${dFrames} frames decoded (total: ${report.framesDecoded || 0}, ${report.bytesReceived} bytes, ${report.packetsLost || 0} lost)`);
              }
            });
          } catch (err) {
            log(`stats err: ${err.message}`, 'err');
          }
        }, 3000);
        // Focus video for keyboard capture
        video.focus();
      };
    }

    async function handleSignal(payload) {
      if (!payload.signal) return;

      if (payload.signal === 'offer') {
        log(`Received SDP offer from agent (${payload.sdp.length} bytes)`, 'ok');
        setStatus('Negotiating...', 'connecting');
        // Agent is here — stop pinging ready
        if (window.readyInterval) { clearInterval(window.readyInterval); window.readyInterval = null; }

        createPeerConnection();
        await pc.setRemoteDescription({ type: 'offer', sdp: payload.sdp });

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        log(`Sending SDP answer (${answer.sdp.length} bytes)`);
        sendSignal({ signal: 'answer', sdp: answer.sdp });
      }
      else if (payload.signal === 'ice-candidate') {
        if (pc && payload.candidate) {
          await pc.addIceCandidate({
            candidate: payload.candidate.candidate,
            sdpMLineIndex: payload.candidate.sdpMLineIndex,
            sdpMid: payload.candidate.sdpMid
          });
        }
      }
    }
  </script>
</body>
</html>
