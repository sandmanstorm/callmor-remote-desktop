<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Callmor Relay Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; padding: 2rem; }
    h1 { margin-bottom: 1rem; font-size: 1.5rem; }
    .controls { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    label { display: flex; align-items: center; gap: 0.25rem; }
    input, select, button { padding: 0.5rem; border-radius: 4px; border: 1px solid #444; background: #222; color: #eee; font-size: 0.9rem; }
    button { cursor: pointer; background: #2563eb; border-color: #2563eb; }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #log { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 1rem; height: 400px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; }
    .sent { color: #4ade80; }
    .recv { color: #60a5fa; }
    .sys { color: #facc15; }
    .err { color: #f87171; }
  </style>
</head>
<body>
  <h1>Callmor Relay Test</h1>

  <div class="controls">
    <label>URL: <input id="url" value="ws://localhost:8080" size="30"></label>
    <label>Role:
      <select id="role">
        <option value="agent">Agent</option>
        <option value="browser">Browser</option>
      </select>
    </label>
    <label>Machine ID: <input id="machineId" value="test-machine-1" size="20"></label>
    <button id="connectBtn" onclick="connect()">Connect</button>
    <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
  </div>

  <div class="controls">
    <label>Message: <input id="msg" value="Hello from the other side!" size="40"></label>
    <button id="sendBtn" onclick="sendMsg()" disabled>Send</button>
  </div>

  <div id="log"></div>

  <script>
    let ws = null;

    function log(text, cls = 'sys') {
      const el = document.getElementById('log');
      const ts = new Date().toLocaleTimeString();
      el.innerHTML += `<span class="${cls}">[${ts}] ${text}</span>\n`;
      el.scrollTop = el.scrollHeight;
    }

    function connect() {
      const url = document.getElementById('url').value;
      const role = document.getElementById('role').value;
      const machineId = document.getElementById('machineId').value;

      log(`Connecting to ${url}...`);
      ws = new WebSocket(url);

      ws.onopen = () => {
        log('WebSocket connected');
        const hello = JSON.stringify({ type: 'hello', role, machine_id: machineId });
        ws.send(hello);
        log(`Sent: ${hello}`, 'sent');

        document.getElementById('connectBtn').disabled = true;
        document.getElementById('disconnectBtn').disabled = false;
        document.getElementById('sendBtn').disabled = false;
      };

      ws.onmessage = (e) => {
        log(`Recv: ${e.data}`, 'recv');
      };

      ws.onclose = (e) => {
        log(`Disconnected (code=${e.code}, reason=${e.reason})`);
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('disconnectBtn').disabled = true;
        document.getElementById('sendBtn').disabled = true;
        ws = null;
      };

      ws.onerror = (e) => {
        log('WebSocket error', 'err');
      };
    }

    function disconnect() {
      if (ws) ws.close();
    }

    function sendMsg() {
      if (!ws) return;
      const text = document.getElementById('msg').value;
      const msg = JSON.stringify({ type: 'relay', payload: { text } });
      ws.send(msg);
      log(`Sent: ${msg}`, 'sent');
    }

    // Allow Enter key to send
    document.getElementById('msg').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMsg();
    });
  </script>
</body>
</html>
