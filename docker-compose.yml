services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config/coturn/turnserver.conf:/etc/turnserver.conf:ro
    command: ["-c", "/etc/turnserver.conf", "--static-auth-secret=${TURN_SECRET}"]

  # --- RustDesk self-hosted stack ---------------------------------------------
  # hbbs: ID/rendezvous server — clients register here and discover each other.
  # hbbr: relay server — fallback path when direct P2P fails.
  # Run in host-network mode so all the peer traffic ports (21115-21119 TCP,
  # 21116 UDP) are reachable without Docker's NAT getting in the way. RustDesk
  # clients will be pointed at `rd.callmor.ai` with a RELAY/ID server setting.
  rustdesk-hbbs:
    image: rustdesk/rustdesk-server:latest
    restart: unless-stopped
    network_mode: host
    command: hbbs -r rd.callmor.ai:21117
    volumes:
      - rustdesk-data:/root
    depends_on:
      - rustdesk-hbbr

  rustdesk-hbbr:
    image: rustdesk/rustdesk-server:latest
    restart: unless-stopped
    network_mode: host
    command: hbbr
    volumes:
      - rustdesk-data:/root

volumes:
  pgdata:
  minio-data:
  rustdesk-data:
