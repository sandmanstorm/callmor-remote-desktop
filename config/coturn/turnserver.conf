# coturn TURN server configuration for Callmor Remote Desktop

# Network
listening-port=3478
# External IP: public IP, internal IP
external-ip=98.189.108.123/10.10.100.34

# Relay port range (must be forwarded on router)
min-port=49152
max-port=49252

# Domain
realm=callmor.ai
server-name=turn.callmor.ai

# Authentication: use long-term credentials with shared secret
# Clients generate time-limited TURN credentials from this secret
use-auth-secret
# static-auth-secret is passed via command line (--static-auth-secret)

# TLS not needed — NPM terminates SSL for HTTP/WS.
# TURN clients connect via UDP directly (port-forwarded), no TLS on TURN.
no-tls
no-dtls

# Logging
log-file=stdout
verbose

# Security
no-multicast-peers
no-cli
fingerprint
